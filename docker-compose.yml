version: '3.8'

services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./Backend:/app
      - /app/node_modules
    environment:
      - PORT=5000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/sankalp_db
      - JWT_SECRET=supersecret123
    depends_on:
      db:
        condition: service_started

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - VITE_PORT=5173
    depends_on:
      - backend

  db:
    image: postgis/postgis:15-3.4
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sankalp_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
